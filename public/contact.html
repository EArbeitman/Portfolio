    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="../js/index.js"></script>


    </head>

    <div class = "container">
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="navbarColor01">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">About Me</span></a>

    <body>

      <div class="container">
        <section class="row">
          <div class="col-md-8">
            <form class="contact-form">
              <h1> Message Me</h1>
              <hr class="contact-hr"/>
                <div class="form-group">
                  <label class="col-form-label col-form-label-sm" for="inputSmall">Name</label>
                  <input class="form-control form-control-sm" type="text" id="inputSmall">
                </div>
              <div class="form-group">
                <label for="exampleInputEmail1">Email address</label>
                <input type="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Enter email" autocomplete="off">
                <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
              </div>
              <div class="form-group">
                <label for="exampleTextarea">Message</label>
                <textarea class="form-control" id="exampleTextarea" rows="3"></textarea>
              </div>
              <button class="submit-btn">Submit</button>
            </form>
          </div>
          <div class="col-md-4">

            <!-- Start of Connect With Me Area -->
            <section id="connect-with-me-area">
              <div class="connect-with-me-content">
                <h1 class="connect-with-me-header">Connect With Me</h1>
                <hr />
                <div id="images">
                  <div class = "row">
                    <div class = "col-sm-4">
                    <a href = "https://github.com/EArbeitman" target="_blank">
                      <img src="../images/github.png" alt="" class="connect-with-me-photo">
                    </a>
                  </div>
                  <div class = "col-sm-4">
                    <a href = "https://www.linkedin.com/in/evan-arbeitman-4300708a/" target="_blank">
                      <img src="../images/linkedin.png" alt="" class="connect-with-me-photo">
                    </a>
                  </div>
                  <div class = "col-sm-4">
                    <a href = "https://stackoverflow.com/users/story/4709902" target="_blank">
                      <img src="../images/stackover2.png" alt="" class="connect-with-me-photo">
                    </a>
                  </div>
                </div>
              </div>
            </section>

            <!-- End of the Connect With Me Area -->
          </div>
        </section>
      </div>

      <!--Import jQuery before materialize.js-->
      <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
      <script type="text/javascript" src="js/materialize.min.js"></script>
    </body>
  </html>
